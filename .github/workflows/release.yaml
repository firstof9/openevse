name: Release

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Manually enter tag'
        required: true
  release:
    types: [published]

jobs:
  release_zip_file:
    name: Prepare release asset
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get Version
        id: get_version
        if: ${{ github.event_name == 'release' }}
        run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> "$GITHUB_ENV"

      - name: "Set version numbmer"
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.tags != '') }}
        run: |
          TAG_NAME=${{ github.event_name == 'workflow_dispatch' && inputs.tags || env.VERSION }}
          sed -i "/VERSION = /c\VERSION = \"$TAG_NAME\"" ${{ github.workspace }}/custom_components/openevse/const.py
          sed -i "/version/c\  \"version\": \"$TAG_NAME\"," ${{ github.workspace }}/custom_components/openevse/manifest.json

      # Pack the openevse dir as a zip and upload to the release
      - name: Create Zip File
        run: |
          cd ${{ github.workspace }}/custom_components/openevse
          zip openevse.zip -r ./

      - name: 📤 Upload zip to release
        if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: ${{ github.workspace }}/custom_components/openevse/openevse.zip
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tags || github.event.release.tag_name }}
